name: vinylvault

services:
  mongodb:
    image: mongo:latest
    command: ["--replSet", "rs0", "--bind_ip_all"]
    container_name: vinylvault-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=vinylvault
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - vinylvault-network

  mongo-rs-init:
    image: mongo:latest
    depends_on:
      mongodb:
        condition: service_healthy
    command: >
      mongosh --host mongodb:27017 --eval "
        try { rs.status() } catch(e) {
          rs.initiate({_id:'rs0', members:[{_id:0, host:'mongodb:27017'}]});
        };
        var retries = 30;
        while (retries-- > 0) {
          try { if (rs.status().myState === 1) { print('PRIMARY ready'); quit(0); } } catch(e) {}
          sleep(1000);
        };
        print('ERROR: did not become PRIMARY'); quit(1);
      "
    restart: "no"
    networks:
      - vinylvault-network

  typesense:
    image: typesense/typesense:26.0
    container_name: vinylvault-typesense
    restart: unless-stopped
    ports:
      - "8108:8108"
    volumes:
      - typesense_data:/data
    command: --data-dir=/data --api-key=${TYPESENSE_API_KEY:-local-dev-key} --enable-cors
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8108/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - vinylvault-network

  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    container_name: vinylvault-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_URI_BASE=${MONGODB_URI_BASE:-mongodb://mongodb:27017}
      - MONGODB_REGISTRY_URI=${MONGODB_REGISTRY_URI:-mongodb://mongodb:27017/vinylvault_registry}
      - BACKEND_PORT=${BACKEND_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - DISCOGS_API_TOKEN=${DISCOGS_API_TOKEN}
      - MUSICBRAINZ_USER_AGENT=${MUSICBRAINZ_USER_AGENT}
      - TYPESENSE_HOST=typesense
      - TYPESENSE_PORT=8108
      - TYPESENSE_PROTOCOL=http
      - TYPESENSE_API_KEY=${TYPESENSE_API_KEY:-local-dev-key}
    depends_on:
      mongo-rs-init:
        condition: service_completed_successfully
      typesense:
        condition: service_healthy
    networks:
      - vinylvault-network

  sync-worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.sync-worker
    container_name: vinylvault-sync-worker
    restart: unless-stopped
    environment:
      - MONGODB_URI_BASE=${MONGODB_URI_BASE:-mongodb://mongodb:27017}
      - MONGODB_REGISTRY_URI=${MONGODB_REGISTRY_URI:-mongodb://mongodb:27017/vinylvault_registry}
      - JWT_SECRET=${JWT_SECRET}
      - TYPESENSE_HOST=typesense
      - TYPESENSE_PORT=8108
      - TYPESENSE_PROTOCOL=http
      - TYPESENSE_API_KEY=${TYPESENSE_API_KEY:-local-dev-key}
    depends_on:
      mongo-rs-init:
        condition: service_completed_successfully
      typesense:
        condition: service_healthy
    networks:
      - vinylvault-network

  bff:
    build:
      context: ..
      dockerfile: infra/Dockerfile.bff
    container_name: vinylvault-bff
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - BACKEND_URL=${BACKEND_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - BFF_PORT=${BFF_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_CALLBACK_URL=${GITHUB_CALLBACK_URL}
    depends_on:
      - backend
    networks:
      - vinylvault-network

  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
    container_name: vinylvault-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - bff
    networks:
      - vinylvault-network

volumes:
  mongodb_data:
  typesense_data:

networks:
  vinylvault-network:
    driver: bridge
