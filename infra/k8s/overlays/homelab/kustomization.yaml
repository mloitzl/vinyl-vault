apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vinylvault

resources:
  - ../../base
  - ../../base/mongodb

replicas:
  # 2 replicas for stateless app pods — spread across both server nodes for zero-downtime deploys.
  - name: backend
    count: 2
  - name: bff
    count: 2
  - name: frontend
    count: 2
  # 3-node Raft quorum (2/3) — works on 2 physical nodes (asymmetric), symmetric HA with 3 nodes.
  - name: typesense
    count: 3
  - name: mongodb
    count: 3
  - name: sync-worker
    count: 1

images:
  - name: ghcr.io/mloitzl/vinylvault-backend
    newTag: latest-production
  - name: ghcr.io/mloitzl/vinylvault-bff
    newTag: latest-production
  - name: ghcr.io/mloitzl/vinylvault-frontend
    newTag: latest-production
  - name: ghcr.io/mloitzl/vinylvault-sync-worker
    newTag: latest-production
  - name: typesense/typesense
    newTag: 31.0.rc6-arm64-lg-page16
  - name: mongo
    newTag: "8.0"

configMapGenerator:
  - name: app-config
    behavior: replace
    literals:
      - FRONTEND_URL=https://vinylvault.cloudforge.cc
      - BFF_URL=http://bff.vinylvault.svc.cluster.local:3000
      - BACKEND_URL=http://backend.vinylvault.svc.cluster.local:4000/graphql
      - GITHUB_APP_INSTALLATION_URL=https://github.com/apps/vinyl-vault-multiuser/installations/new
      - GITHUB_CALLBACK_URL=https://vinylvault.cloudforge.cc/auth/github/callback
      - ENABLE_DISCOGS_INTEGRATION=true
      - ENABLE_TENANT_FEATURES=true
      - TYPESENSE_HOST=typesense
      - TYPESENSE_PORT=8108
      - TYPESENSE_PROTOCOL=http
      - TYPESENSE_ENABLED=true
  - name: otel-config
    behavior: merge
    literals:
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=production

patches:
  # Switch ingress to nginx + vinylvault.cloudforge.cc
  - target:
      kind: Ingress
      name: vinylvault-ingress
    patch: |-
      - op: replace
        path: /metadata/annotations
        value:
          cert-manager.io/cluster-issuer: letsencrypt-production
          nginx.ingress.kubernetes.io/ssl-redirect: "false"
      - op: replace
        path: /spec/ingressClassName
        value: nginx
      - op: replace
        path: /spec/tls/0/hosts/0
        value: vinylvault.cloudforge.cc
      - op: replace
        path: /spec/tls/0/secretName
        value: vinylvault-cloudforge-cc-tls
      - op: replace
        path: /spec/rules/0/host
        value: vinylvault.cloudforge.cc

  # Use local-path for Typesense PVC — Typesense has built-in Raft HA, no need for Longhorn replication.
  - target:
      kind: StatefulSet
      name: typesense
    patch: |-
      - op: add
        path: /spec/volumeClaimTemplates/0/spec/storageClassName
        value: local-path

  # Use local-path for MongoDB PVC — MongoDB RS provides its own replication, Longhorn adds unnecessary I/O overhead.
  - target:
      kind: StatefulSet
      name: mongodb
    patch: |-
      - op: add
        path: /spec/volumeClaimTemplates/0/spec/storageClassName
        value: local-path

  # Enforce one pod per node for stateless deployments.
  # DoNotSchedule guarantees pods never co-locate, so losing any single node
  # always leaves at least one replica running.
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /spec/template/spec/topologySpreadConstraints
        value:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: DoNotSchedule
            labelSelector: {}
            matchLabelKeys:
              - app

  # Add GHCR imagePullSecret to all app Deployments
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /spec/template/spec/imagePullSecrets
        value:
          - name: ghcr-pull-secret

  # Homelab HPA: min=2 ensures one pod survives any single node loss.
  # max=3 allows HPA to scale to fill all 3 nodes under load.
  - target:
      kind: HorizontalPodAutoscaler
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 3
