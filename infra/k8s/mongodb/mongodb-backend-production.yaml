---
# MongoDB for Backend (Registry + Tenant Databases) - PRODUCTION
# Single-node replica set — required for multi-document transactions.
apiVersion: v1
kind: Service
metadata:
  name: mongodb-backend
  namespace: vinylvault-production
  labels:
    app: mongodb-backend
    component: database
    environment: production
spec:
  clusterIP: None  # Headless service — gives pods stable DNS names
  ports:
    - port: 27017
      targetPort: 27017
      name: mongodb
  selector:
    app: mongodb-backend
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb-backend
  namespace: vinylvault-production
  labels:
    app: mongodb-backend
    component: database
    environment: production
spec:
  serviceName: mongodb-backend
  replicas: 1
  selector:
    matchLabels:
      app: mongodb-backend
  template:
    metadata:
      labels:
        app: mongodb-backend
        component: database
        environment: production
    spec:
      securityContext:
        fsGroup: 999
      initContainers:
        - name: keyfile-init
          image: busybox:1.35
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              cp /keyfile-src/keyfile /keyfile/keyfile
              chown 999:999 /keyfile/keyfile
              chmod 400 /keyfile/keyfile
          volumeMounts:
            - name: keyfile-src
              mountPath: /keyfile-src
              readOnly: true
            - name: keyfile
              mountPath: /keyfile
      containers:
        - name: mongodb
          image: mongo:4.4.6
          args: ["--replSet", "rs0", "--bind_ip_all", "--keyFile", "/etc/mongodb/keyfile"]
          ports:
            - containerPort: 27017
              name: mongodb
          lifecycle:
            postStart:
              exec:
                command:
                  - bash
                  - -c
                  - |
                    # Wait until MongoDB accepts authenticated connections
                    until mongo -u root -p "$MONGO_INITDB_ROOT_PASSWORD" \
                      --authenticationDatabase admin \
                      --eval "db.adminCommand('ping').ok" --quiet 2>/dev/null; do
                      sleep 2
                    done
                    # Initiate the replica set using the pod's stable DNS FQDN.
                    # Using the FQDN (not localhost) is critical: when the application
                    # driver discovers RS members it must be able to resolve this name
                    # from other pods.
                    mongo -u root -p "$MONGO_INITDB_ROOT_PASSWORD" \
                      --authenticationDatabase admin \
                      --eval "
                        try {
                          rs.initiate({
                            _id: 'rs0',
                            members: [{
                              _id: 0,
                              host: 'mongodb-backend-0.mongodb-backend.vinylvault-production.svc.cluster.local:27017'
                            }]
                          });
                        } catch(e) {
                          if (e.code !== 23) { print(e); exit(1); }
                        }
                      " --quiet
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: "root"
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-backend-secret
                  key: mongodb-root-password
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
            - name: keyfile
              mountPath: /etc/mongodb/keyfile
              subPath: keyfile
          resources:
            requests:
              cpu: 1000m
              memory: 2Gi
            limits:
              cpu: 4000m
              memory: 4Gi
          livenessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - >-
                  mongo -u root -p "$MONGO_INITDB_ROOT_PASSWORD"
                  --authenticationDatabase admin
                  --eval "db.adminCommand('ping').ok" --quiet
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: keyfile-src
          secret:
            secretName: mongodb-keyfile
            defaultMode: 0400
        - name: keyfile
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: mongodb-data
        labels:
          app: mongodb-backend
          environment: production
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: nfs-client
        resources:
          requests:
            storage: 100Gi
