apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-config
data:
  # Betterstack Logs OTLP ingestion endpoint.
  OTEL_EXPORTER_OTLP_ENDPOINT: "https://in.logs.betterstack.com"

  # Override per overlay: deployment.environment=staging|demo
  OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=staging"
