apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-config
data:
  # New Relic OTLP endpoint — same for all environments.
  # deployment.environment is set per-overlay via OTEL_RESOURCE_ATTRIBUTES.
  OTEL_EXPORTER_OTLP_ENDPOINT: "https://otlp.nr-data.net:4318"

  # Override per overlay: deployment.environment=staging|demo
  OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=staging"
