# Kubernetes Secrets Template - Spotify Credentials
#
# Values must be base64-encoded before applying to the cluster.
# Get credentials from: https://developer.spotify.com/dashboard
# (optional — enables track preview buttons)
#
# To encode a value:
#   echo -n 'your-value' | base64

apiVersion: v1
kind: Secret
metadata:
  name: spotify-secrets
type: Opaque
data:
  SPOTIFY_CLIENT_ID: "REPLACE_WITH_BASE64_ENCODED_SPOTIFY_CLIENT_ID"
  SPOTIFY_CLIENT_SECRET: "REPLACE_WITH_BASE64_ENCODED_SPOTIFY_CLIENT_SECRET"
