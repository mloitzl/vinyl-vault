# Kubernetes Secrets Template - Discogs API Token
#
# Values must be base64-encoded before applying to the cluster.
# Get token from: https://www.discogs.com/settings/developers
#
# To encode a value:
#   echo -n 'your-discogs-api-token' | base64

apiVersion: v1
kind: Secret
metadata:
  name: discogs-secrets
type: Opaque
data:
  DISCOGS_API_TOKEN: "REPLACE_WITH_BASE64_ENCODED_DISCOGS_API_TOKEN"
