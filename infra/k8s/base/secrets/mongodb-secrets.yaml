# Kubernetes Secrets Template - MongoDB Connection Strings
#
# Values must be base64-encoded before applying to the cluster.
# Single MongoDB instance with replica set rs0 (required for transactions).
#
# To encode a value:
#   echo -n 'mongodb://...' | base64

apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secrets
type: Opaque
data:
  # MongoDB root username (used by StatefulSet init + rs-init job)
  # echo -n 'root' | base64
  MONGODB_ROOT_USERNAME: "REPLACE_WITH_BASE64_ENCODED_USERNAME"

  # MongoDB root password — generate with: openssl rand -hex 20
  # echo -n 'your-password' | base64
  MONGODB_ROOT_PASSWORD: "REPLACE_WITH_BASE64_ENCODED_PASSWORD"

  # BFF MongoDB URI (sessions database)
  # Format: mongodb://root:<password>@mongodb:27017/vinylvault_bff?authSource=admin&replicaSet=rs0
  MONGODB_BFF_URI: "REPLACE_WITH_BASE64_ENCODED_BFF_MONGODB_URI"

  # Backend Registry MongoDB URI
  # Format: mongodb://root:<password>@mongodb:27017/vinylvault_registry?authSource=admin&replicaSet=rs0
  # replicaSet=rs0 is REQUIRED for multi-document transactions (friend accept/remove).
  MONGODB_REGISTRY_URI: "REPLACE_WITH_BASE64_ENCODED_REGISTRY_MONGODB_URI"

  # Backend Tenant Base URI (without database name)
  # Format: mongodb://root:<password>@mongodb:27017/?authSource=admin&replicaSet=rs0
  MONGODB_URI_BASE: "REPLACE_WITH_BASE64_ENCODED_BASE_MONGODB_URI"
