# Kubernetes Secret Template — DO NOT COMMIT WITH REAL VALUES
#
# OTEL_EXPORTER_OTLP_HEADERS carries the Betterstack source token.
# Create a Source in Betterstack Logs (platform: OpenTelemetry) and copy
# the Source Token from the source settings page.
#
# To encode:
#   echo -n 'Authorization=Bearer YOUR_BETTERSTACK_SOURCE_TOKEN' | base64
#
# To apply:
#   kubectl apply -f otel-secrets.yaml -n vinylvault-staging

apiVersion: v1
kind: Secret
metadata:
  name: otel-secrets
type: Opaque
data:
  # Format: Authorization=Bearer <BETTERSTACK_SOURCE_TOKEN>  (base64-encoded)
  OTEL_EXPORTER_OTLP_HEADERS: "REPLACE_WITH_BASE64_ENCODED_Authorization=Bearer_YOUR_BETTERSTACK_SOURCE_TOKEN"
