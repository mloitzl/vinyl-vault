# Kubernetes Secret Template — DO NOT COMMIT WITH REAL VALUES
#
# OTEL_EXPORTER_OTLP_HEADERS carries the New Relic Ingest (License) key.
# Use a New Relic "License key" (not a User API key) — it is write-only.
#
# To encode:
#   echo -n 'api-key=YOUR_NR_LICENSE_KEY' | base64
#
# To apply:
#   kubectl apply -f otel-secrets.yaml -n vinylvault-staging

apiVersion: v1
kind: Secret
metadata:
  name: otel-secrets
type: Opaque
data:
  # Format: api-key=<NR_LICENSE_KEY>  (base64-encoded)
  OTEL_EXPORTER_OTLP_HEADERS: "REPLACE_WITH_BASE64_ENCODED_api-key=YOUR_NR_LICENSE_KEY"
