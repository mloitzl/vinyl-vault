# BFF GraphQL Schema — Auth & Session types only.
# Domain types (Record, Release, Album, etc.) come from the stitched Backend schema.

extend type Query {
  """
  The currently authenticated user, or null if not logged in.
  """
  viewer: User

  """
  Look up a Spotify track preview URL for the given track/artist pair.
  Returns nullable URLs when no match is found or Spotify credentials are not configured.
  """
  spotifyPreview(track: String!, artist: String!): SpotifyPreviewResult!
}

extend type Mutation {
  """
  Switch the active tenant for the current user.
  Updates the session and returns the user with the new active tenant context.
  """
  switchTenant(tenantId: String!): User!

  """
  Update personal settings for the current user. Persists to the database
  and updates the session so subsequent /auth/me calls reflect the change.
  """
  updateUserSettings(input: UpdateUserSettingsInput!): User!
}

# Extends the backend User type with session-specific data resolved by the BFF.
extend type User {
  availableTenants: [Tenant!]!
  activeTenant: Tenant
  featureFlags: FeatureFlags!
}

# TenantType and TenantRole are defined in the backend schema with identical values.
# They arrive in the stitched schema from the remote subschema — no redefinition needed.

"""
Feature flags surfaced to the frontend.
"""
type FeatureFlags {
  enableTenantFeatures: Boolean!
}

"""
A tenant available to the authenticated user (personal or organization collection).
"""
type Tenant {
  id: String!
  name: String!
  type: TenantType!
  role: TenantRole!
}

"""
Spotify preview lookup result.
"""
type SpotifyPreviewResult {
  previewUrl: String
  spotifyUrl: String
}
