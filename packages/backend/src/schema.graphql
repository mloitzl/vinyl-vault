# Domain Backend GraphQL Schema

"""
Relay-compatible Node interface. All persisted domain types implement this.
"""
interface Node {
  id: ID!
}

type Query {
  """
  Get a user by ID.
  """
  user(id: ID!): User

  """
  Get a record by ID.
  """
  record(id: ID!): Record

  """
  Get a release by ID.
  """
  release(id: ID!): Release

  """
  Search releases by barcode.
  """
  releasesByBarcode(barcode: String!): [Release!]!

  """
  List records with cursor-based pagination and filtering.
  The active user and tenant are resolved from the JWT — no userId parameter needed.
  """
  records(
    first: Int
    after: String
    last: Int
    before: String
    filter: RecordFilter
  ): RecordConnection!

  """
  Browse records grouped by artist.
  """
  artists(first: Int, after: String, filter: ArtistFilter): ArtistConnection!

  """
  Browse records grouped by release (album title + artist).
  """
  albums(first: Int, after: String, filter: AlbumBrowseFilter): AlbumBrowseConnection!

  """
  All genres present in the current tenant's collection.
  """
  genres: [GenreView!]!

  """
  Get all tenants for a user (including their role in each tenant).
  """
  userTenants(userId: ID!): [UserTenantRole!]!

  """
  Exact-match search for users by GitHub login or email.
  Returns empty array if the matched user has allowFriendInvites = false.
  """
  searchUsers(query: String!): [User!]!

  """Lists incoming friend requests for the current user."""
  pendingFriendRequests(first: Int, after: String): FriendRequestConnection!

  """Lists outgoing friend requests sent by the current user."""
  sentFriendRequests(first: Int, after: String): FriendRequestConnection!

  """Lists established friends (symmetric VIEWERs in personal tenant)."""
  friends(first: Int, after: String): UserConnection!

  """
  Aggregated notification count for the current user across all notification types
  (pending friend requests, future: new records from friends, etc.).
  Returns 0 for unauthenticated users.
  """
  notificationCount: Int!

  """
  Full-text search across the current user's record collection with faceted refiners.
  Powered by Typesense — supports plain text, phrase search ("..."), and +must tokens;
  -prefix tokens are dropped and currently have no exclusion effect.
  """
  searchRecords(
    query: String!
    first: Int
    after: String
    filter: RecordSearchFilter
  ): SearchRecordsResult!
}

type Mutation {
  """
  Look up a barcode and return matching releases with scoring.
  """
  scanBarcode(barcode: String!): ScanBarcodePayload!

  """
  Create a new record.
  """
  createRecord(input: CreateRecordInput!): CreateRecordPayload!

  """
  Update a record.
  """
  updateRecord(input: UpdateRecordInput!): UpdateRecordPayload!

  """
  Delete a record.
  """
  deleteRecord(input: DeleteRecordInput!): DeleteRecordPayload!

  """
  Create or update a user from GitHub data.
  """
  upsertUser(input: UpsertUserInput!): User!
  updateUserSettings(input: UpdateUserSettingsInput!): User!

  """
  Create a new tenant (personal or organization).
  """
  createTenant(input: CreateTenantInput!): Tenant!

  """
  Add a user to a tenant with a specific role.
  """
  addUserToTenant(userId: ID!, tenantId: String!, role: TenantRole!): UserTenantRole!

  """
  Handle GitHub installation webhook payloads forwarded by the BFF.
  Validates the signature and stores installation metadata in the registry database.
  """
  handleGitHubInstallationWebhook(
    input: GitHubInstallationWebhookInput!
  ): GitHubInstallationWebhookResult!

  """
  Complete GitHub App installation setup: link user to installation and create org tenant.
  Called after user is redirected from GitHub post-installation.
  Requires authenticated user (BFF validates session).
  """
  completeInstallationSetup(
    input: CompleteInstallationSetupInput!
  ): CompleteInstallationSetupResult!

  sendFriendRequest(githubLogin: String!): SendFriendRequestPayload!
  respondToFriendRequest(requestId: ID!, accept: Boolean!): RespondToFriendRequestPayload!
  removeFriend(friendId: ID!): RemoveFriendPayload!
}

type User implements Node {
  id: ID!
  githubId: String!
  githubLogin: String!
  displayName: String!
  avatarUrl: String
  email: String
  role: UserRole!
  settings: UserSettings!
  friendshipStatus: FriendshipStatus
  createdAt: String!
  updatedAt: String!
}

"""
User role in the application.
- ADMIN: Full control over the application and all tenants
- MEMBER: Can create and manage their own content
- VIEWER: Read-only access
"""
enum UserRole {
  ADMIN
  MEMBER
  VIEWER
}

type Record implements Node {
  id: ID!
  release: Release!
  owner: User!
  purchaseDate: String
  price: Float
  condition: String
  location: String
  notes: String
  createdAt: String!
  updatedAt: String!
}

type Release implements Node {
  id: ID!
  barcode: String!
  artist: String!
  title: String!
  year: Int
  format: String
  genre: [String!]
  style: [String!]
  label: String
  country: String
  coverImageUrl: String
  trackList: [Track!]
  externalId: String
  source: ReleaseSource!
  createdAt: String!
  updatedAt: String!
}

type Track {
  position: String
  title: String!
  duration: String
}

enum ReleaseSource {
  DISCOGS
  MUSICBRAINZ
  MANUAL
}

"""
Tenant type: USER (personal) or ORGANIZATION (shared).
"""
enum TenantType {
  USER
  ORGANIZATION
}

"""
User role within a tenant: ADMIN, MEMBER, or VIEWER.
"""
enum TenantRole {
  ADMIN
  MEMBER
  VIEWER
}

"""
A tenant (personal or organization collection).
"""
type Tenant {
  """
  Unique tenant identifier (user_{userId} or org_{orgId}).
  """
  tenantId: String!

  """
  Type of tenant: USER or ORGANIZATION.
  """
  tenantType: TenantType!

  """
  Display name (user display name or organization name).
  """
  name: String!

  """
  Database name for this tenant.
  """
  databaseName: String!

  """
  When the tenant was created.
  """
  createdAt: String!
}

"""
A user's role in a specific tenant.
"""
type UserTenantRole {
  """
  User ID (MongoDB ObjectId as string).
  """
  userId: ID!

  """
  Tenant identifier.
  """
  tenantId: String!

  """
  User's role in this tenant: ADMIN, MEMBER, or VIEWER.
  """
  role: TenantRole!

  """
  Tenant type: USER or ORGANIZATION.
  """
  tenantType: TenantType!

  """
  Tenant display name.
  """
  name: String!

  """
  Tenant database name.
  """
  databaseName: String!

  """
  When the role was created.
  """
  createdAt: String!
}

"""
Input for creating a new tenant.
"""
input CreateTenantInput {
  """
  Type of tenant to create: USER or ORGANIZATION.
  """
  tenantType: TenantType!

  """
  Display name for the tenant.
  """
  name: String!

  """
  GitHub organization ID (for ORGANIZATION tenants only).
  """
  githubOrgId: String

  """
  GitHub organization name (for ORGANIZATION tenants only).
  """
  githubOrgName: String
}

type RecordConnection {
  edges: [RecordEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type RecordEdge {
  cursor: String!
  node: Record!
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

"""A single facet bucket with a value and its document count."""
type SearchFacetBucket {
  value: String!
  count: Int!
}

"""Facet counts for all refinable dimensions."""
type SearchFacets {
  artist:    [SearchFacetBucket!]!
  title:     [SearchFacetBucket!]!
  genre:     [SearchFacetBucket!]!
  format:    [SearchFacetBucket!]!
  condition: [SearchFacetBucket!]!
  location:  [SearchFacetBucket!]!
  country:   [SearchFacetBucket!]!
}

"""One text segment in a search highlight: a matched hit or surrounding context."""
type SearchHighlightText {
  value: String!
  """Either "hit" (matched term) or "text" (surrounding context)."""
  type: String!
}

"""Highlight entry for a single field: contains matched text segments."""
type SearchHighlight {
  path:   String!
  texts:  [SearchHighlightText!]!
  score:  Float
}

"""Search result edge — record plus per-field highlights."""
type SearchRecordEdge {
  cursor:     String!
  node:       Record!
  highlights: [SearchHighlight!]!
}

"""Result of searchRecords — paginated edges plus facet refiners."""
type SearchRecordsResult {
  edges:      [SearchRecordEdge!]!
  pageInfo:   PageInfo!
  totalCount: Int!
  facets:     SearchFacets!
}

"""Active filter selections passed to searchRecords to narrow results."""
input RecordSearchFilter {
  artist:    [String!]
  title:     [String!]
  genre:     [String!]
  format:    [String!]
  condition: [String!]
  location:  [String!]
  country:   [String!]
}

input RecordFilter {
  artist: String
  title: String
  year: Int
  format: String
  genre: String
  location: String
  search: String
}

input CreateRecordInput {
  releaseId: ID!
  purchaseDate: String
  price: Float
  condition: String
  location: String
  notes: String
}

input UpdateRecordInput {
  id: ID!
  purchaseDate: String
  price: Float
  condition: String
  location: String
  notes: String
}

input DeleteRecordInput {
  id: ID!
}

type CreateRecordPayload {
  record: Record
  errors: [String!]
}

type UpdateRecordPayload {
  record: Record
  errors: [String!]
}

type DeleteRecordPayload {
  deletedRecordId: ID
  errors: [String!]
}

input UpsertUserInput {
  githubId: String!
  githubLogin: String!
  displayName: String!
  avatarUrl: String
  email: String
}

"""
Per-user application settings persisted in the database.
"""
type UserSettings {
  spotifyPreview: Boolean!
  allowFriendInvites: Boolean!
}

input UpdateUserSettingsInput {
  spotifyPreview: Boolean
  allowFriendInvites: Boolean
}

enum FriendshipStatus {
  NONE
  PENDING_SENT
  PENDING_RECEIVED
  FRIENDS
}

type FriendRequest implements Node {
  id: ID!
  requester: User!
  recipient: User!
  createdAt: String!
}

type FriendRequestEdge {
  cursor: String!
  node: FriendRequest!
}

type FriendRequestConnection {
  edges: [FriendRequestEdge!]!
  pageInfo: PageInfo!
}

type UserEdge {
  cursor: String!
  node: User!
}

type UserConnection {
  edges: [UserEdge!]!
  pageInfo: PageInfo!
}

type SendFriendRequestPayload {
  friendRequest: FriendRequest!
}

type RespondToFriendRequestPayload {
  """The ID of the deleted request (for @deleteEdge on the pending list)."""
  deletedRequestId: ID!
  """The newly added friend when accept=true; null when declining."""
  newFriend: User
  """Updated notification count after the operation."""
  notificationCount: Int!
}

type RemoveFriendPayload {
  """The ID of the removed friend (for @deleteEdge on the friends list)."""
  removedFriendId: ID!
}

"""
Result of a barcode lookup using the blended scoring approach.
"""
type ScanBarcodePayload {
  """
  Aggregated albums derived from releases across all sources.
  Each album represents a unique normalized artist+title combination.
  Albums are sorted by the score of their primary release (highest first).
  """
  albums: [Album!]!

  """
  Legacy field: flat list of releases for backward compatibility.
  @deprecated Use albums instead for the full scoring and grouping benefits.
  """
  releases: [Release!]! @deprecated(reason: "Use albums instead")

  """
  Whether the result was served from cache.
  """
  fromCache: Boolean!

  """
  Timing information for performance analysis.
  """
  timing: LookupTiming

  """
  Errors encountered during lookup (non-fatal).
  The lookup may still return partial results.
  """
  errors: [String!]
}

"""
An aggregated album combining data from multiple release sources.
Implements FR-AG-* requirements.
"""
type Album {
  """
  Unique album identifier (hash of normalized artist + title).
  """
  id: ID!

  """
  Normalized artist name (main artist, articles removed).
  """
  artist: String!

  """
  Normalized album title (parentheticals and articles removed).
  """
  title: String!

  """
  List of barcode(s) that match this album.
  """
  barcodes: [String!]!

  """
  The primary release selected by highest score.
  """
  primaryRelease: ScoredRelease!

  """
  All alternative releases for this album, sorted by score descending.
  """
  alternativeReleases: [AlternativeRelease!]!

  """
  Best available track list from highest-scoring release with tracks.
  """
  trackList: [Track!]

  """
  Aggregated genres from all releases (deduplicated).
  """
  genres: [String!]!

  """
  Aggregated styles from all releases (deduplicated).
  """
  styles: [String!]!

  """
  All external IDs grouped by source.
  """
  externalIds: ExternalIds!

  """
  Best available cover image URL.
  """
  coverImageUrl: String

  """
  Other title variations found (e.g., remasters, editions).
  """
  otherTitles: [String!]!

  """
  Edition notes collected from releases (e.g., "Remastered", "Deluxe").
  """
  editionNotes: [String!]!

  """
  Number of releases that were grouped into this album.
  """
  releaseCount: Int!

  """
  Score of the primary release (for sorting/display).
  """
  score: Int!
}

"""
A release with its scoring information.
"""
type ScoredRelease {
  """
  Original release data.
  """
  release: Release!

  """
  Total score calculated by the scoring algorithm.
  """
  score: Int!

  """
  Detailed breakdown of how the score was calculated.
  """
  scoreBreakdown: ScoreBreakdown!
}

"""
Score breakdown showing points from each scoring factor.
Implements FR-SC-* requirements for traceability.
"""
type ScoreBreakdown {
  """
  Points from media type preference (FR-SC-1).
  """
  mediaType: Int!

  """
  Points from country preference (FR-SC-2).
  """
  countryPreference: Int!

  """
  Points from track list completeness (FR-SC-3).
  """
  trackListCompleteness: Int!

  """
  Points from cover art availability.
  """
  coverArt: Int!

  """
  Points from label information.
  """
  labelInfo: Int!

  """
  Points from catalog number.
  """
  catalogNumber: Int!

  """
  Points from year information.
  """
  yearInfo: Int!

  """
  Points from source bonus (e.g., Discogs base bonus).
  """
  sourceBonus: Int!
}

"""
An alternative release for an album (simplified view).
"""
type AlternativeRelease {
  """
  External ID from the source.
  """
  externalId: String!

  """
  Source of this release.
  """
  source: ReleaseSource!

  """
  Country of release.
  """
  country: String

  """
  Year of release.
  """
  year: Int

  """
  Format/media type.
  """
  format: String

  """
  Label name.
  """
  label: String

  """
  Score for this release.
  """
  score: Int!

  """
  Edition notes if any.
  """
  editionNote: String
}

"""
External IDs from various sources.
"""
type ExternalIds {
  discogs: [String!]!
  musicbrainz: [String!]!
}

"""
Timing information for performance analysis.
"""
type LookupTiming {
  """
  Time spent fetching from Discogs (ms).
  """
  discogsMs: Int!

  """
  Time spent fetching from MusicBrainz (ms).
  """
  musicbrainzMs: Int!

  """
  Time spent on scoring and aggregation (ms).
  """
  scoringMs: Int!

  """
  Total lookup time (ms).
  """
  totalMs: Int!
}

input GitHubInstallationWebhookInput {
  """
  Base64-encoded raw webhook payload to preserve signature integrity.
  """
  payloadBase64: String!

  """
  X-Hub-Signature-256 header value from GitHub.
  """
  signature: String!
}

type GitHubInstallationWebhookResult {
  ok: Boolean!
  message: String
}

input CompleteInstallationSetupInput {
  """
  User ID (from BFF session, already authenticated).
  """
  userId: String!

  """
  Installation ID from GitHub.
  """
  installationId: Int!

  """
  Setup action (e.g., 'install').
  """
  setupAction: String
}

type CompleteInstallationSetupResult {
  ok: Boolean!
  tenantId: String!
  tenantName: String!
  message: String
}

# ─── Browsing views ──────────────────────────────────────────────────────────

"""
An artist as seen in the current tenant's collection.
"""
type ArtistView implements Node {
  id: ID!
  name: String!
  recordCount: Int!
  coverImageUrl: String
  artistThumbnailUrls: [String!]!
  genres: [String!]!
}

type ArtistConnection {
  edges: [ArtistEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type ArtistEdge {
  cursor: String!
  node: ArtistView!
}

input ArtistFilter {
  search: String
}

"""
An album (release group) as seen in the current tenant's collection.
"""
type AlbumBrowseView implements Node {
  id: ID!
  title: String!
  artist: String!
  year: Int
  coverImageUrl: String
  format: String
  recordCount: Int!
  genres: [String!]!
}

type AlbumBrowseConnection {
  edges: [AlbumBrowseEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type AlbumBrowseEdge {
  cursor: String!
  node: AlbumBrowseView!
}

input AlbumBrowseFilter {
  search: String
  artist: String
}

"""
A genre present in the current tenant's collection.
"""
type GenreView {
  name: String!
  recordCount: Int!
}
